<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رفيق البر - جمعية البر بالعرضية الجنوبية</title>

    <meta name="apple-mobile-web-app-title" content="رفيق البر">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/6qvp47vN/shʿar-aljmʿyt.png">
    <link rel="icon" href="https://i.postimg.cc/6qvp47vN/shʿar-aljmʿyt.png">
    
    <link rel="manifest" href="manifest.json">
    
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

  // بيانات مشروعك الحقيقية
  const firebaseConfig = {
    apiKey: "AIzaSyAvY09SYk1EvyfBuFVDC6Y14oxg_okokVo",
    authDomain: "rafeeqalber.firebaseapp.com",
    projectId: "rafeeqalber",
    storageBucket: "rafeeqalber.firebasestorage.app",
    messagingSenderId: "525633660631",
    appId: "1:525633660631:web:d4ee8de458ba9c72d8b292",
    measurementId: "G-LF3K9CDT32"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  // دالة طلب الإذن من المتبرع
  async function requestPermission() {
    console.log('جاري طلب الإذن...');
    try {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        // ضعي هنا الـ VAPID Key اللي استخرجتيه من Firebase (Cloud Messaging tab)
        const token = await getToken(messaging, { 
          vapidKey: 'BAR5RM0i-E1V1Ote7oQXmCttdhdV-r3vRuHY1vaZPMqergqJbqhNjLgdCCPVf9Zo2CJenni_-SMLsQY6QR3jt0M' 
        });
        if (token) {
          console.log("تم تفعيل الإشعارات بنجاح! التوكن:", token);
          alert("تم تفعيل التنبيهات بنجاح! 🎉");
        }
      } else {
        alert("يرجى السماح بالإشعارات من إعدادات المتصفح.");
      }
    } catch (error) {
      console.error("خطأ في تفعيل الإشعارات:", error);
    }
  }

  // ربط الدالة بالزر الموجود في صفحتك
  window.onload = () => {
    const notifyBtn = document.querySelector('.btn-bot');
    if (notifyBtn) {
      notifyBtn.onclick = (e) => {
        e.preventDefault();
        requestPermission();
      };
    }
  };
</script>

    <style>
        body { 
            /* خلفية متحركة فخمة */
            background: linear-gradient(-45deg, #002222, #004d4d, #003333, #0a1f1f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية زجاجية (Glassmorphism) */
        .card-container { 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        .main-card { 
            width: 100%; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            transition: transform 0.4s ease;
        }

        .main-card:active { transform: scale(0.98); }

        .instruction { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 15px; 
            border-radius: 20px; 
            margin-top: 25px; 
            color: #e0e0e0; 
            font-size: 0.85rem; 
            border: 1px dashed #ffcc00;
            line-height: 1.6;
        }

        .btn-bot { 
            display: inline-block; 
            margin-top: 20px; 
            background: linear-gradient(135deg, #ffcc00, #ff9900); 
            color: #002222; 
            padding: 14px 35px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.2);
            transition: 0.3s;
        }
        
        .btn-bot:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="card-container">
        <img src="https://i.postimg.cc/3xDHZMSk/IMG-4037.jpg" class="main-card" alt="بطاقة رفيق">
        <div class="instruction">
             للاحتفاظ بالبطاقة على جوالك ومتابعة الأثر 📲:<br>
            اضغط <b>سهم المشاركة</b> ثم <b>"إضافة للشاشة الرئيسية"</b>
        </div>
        <a href="https://t.me/YourBot" class="btn-bot">تفعيل التنبيهات 🔔</a>
    </div>
</body>
</html>
